<html lang="en">

  <body>
    <input type="text" />
    <button onclick="diancai()">点菜</button>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
      function diancai() {
        const inp = document.querySelector('input')
        axios({
          url: 'http://192.168.26.54:9999/diancai',
          method: 'get',
          params: {
            type: inp.value,
          },
        })
      }
    </script>
