    <script>
      const box = document.querySelector('.box')

      let innerX = 0
      let innerY = 0

      /**
       * @param { Event } e
       */
      function onMouseMove(e) {
        // console.log(e.clientX, e.clientY);
        // left, top 会引起页面元素的重排
        // box.setAttribute('style', `left: ${ e.clientX }px; top: ${ e.clientY }px;`);
        // css3 只重绘 不重排 (性能优化)
        const x = e.clientX - innerX
        const y = e.clientY - innerY
        const vh = window.innerHeight // 800多
        const vw = window.innerWidth
        const boxH = box.height
        const boxW = box.width

        const maxY = vh - boxH
        const maxX = vw - boxW

        // 真实的y
        const realY = getRangeValue(y, [0, maxY])
        const realX = getRangeValue(x, [0, maxX])

        box.setAttribute('style', `transform: translate(${realX}px, ${realY}px);`)
      }

      // 鼠标按下
      box.addEventListener('mousedown', function (e) {
        e.preventDefault()
        innerX = e.offsetX
        innerY = e.offsetY
        document.addEventListener('mousemove', onMouseMove)
      })

      // 鼠标抬起
      box.addEventListener('mouseup', function () {
        document.removeEventListener('mousemove', onMouseMove)
      })
    </script>
