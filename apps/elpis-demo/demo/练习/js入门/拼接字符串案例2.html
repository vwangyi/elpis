    <title>Document</title>

  <body>
    <script>
      var name = prompt('请输入名字')
      var age = prompt('请输入年龄')

      // 1. 加号拼接(low)
      var result = '你是' + name + ', 你' + age + '岁了'

      // 2. 模板字符串(es6)
      var result = `你是${name}, 你${age}岁了`

      alert(result)
    </script>
  </body>
