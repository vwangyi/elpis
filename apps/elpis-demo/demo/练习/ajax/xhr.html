      // 面试题: 手写axios
      function bxios(config) {
        const { method = 'get', url } = config
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest()
          xhr.open(method, url)
          xhr.send()
          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200) {
                const res = JSON.parse(xhr.responseText)
                resolve(res)
              } else {
                reject(xhr)
              }
            }
          }
        })
      }

      bxios({
        // method: 'get',
        url: URL,
      })
        .then((res) => {
          console.log(res)
        })
        .catch((err) => {
          console.log(err)
        })
