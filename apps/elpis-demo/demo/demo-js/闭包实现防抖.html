<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html:active {
        background-color: red;
      }
    </style>
  </head>
  <body>
    <script>
      // 1. 高仿fn
      // 2. 记timer
      function debounce(fn, delay) {
        let timer = null

        return function (...args) {
          // 高仿fn
          // 1. 执行
          // 2. 参数
          // 3. this

          // 清空定时器
          timer && clearTimeout(timer)

          // 重置定时器时间 重新计时delay毫秒后执行
          timer = setTimeout(() => {
            fn.apply(this, args)
          }, delay)
        }
      }

      function f1(e) {
        console.log(this)
        console.log(e)
      }

      const f2 = debounce(f1, 500)

      document.addEventListener('click', f2)
    </script>
  </body>
</html>
