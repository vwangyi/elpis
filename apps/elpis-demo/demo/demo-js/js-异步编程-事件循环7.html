<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let arr = []
      function getList() {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve([1, 2])
          }, 2000)
        })
      }
      async function test1() {
        if (arr.length === 0) {
          console.log('arr1', arr)
          arr = await getList()
          console.log('arr2', arr)
        }
        console.log('arr3', arr)
      }
      test1().then(() => {
        test1()
      })
      // 输出结果是什么
      // arr1 (0) []
      // arr2 (2) [1, 2]
      // arr3 (2) [1, 2]
      // arr3 (2) [1, 2]
    </script>
  </body>
</html>
