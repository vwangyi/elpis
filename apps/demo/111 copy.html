<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p data-lake-id="u71fd654b" id="u71fd654b">
      <span data-lake-id="u85b38218" id="u85b38218"
        >&lt;h3&gt;我不好&lt;/h3&gt;</span
      >
    </p>
    <div id="editor" contenteditable="true">
      <br />
      <br />
      <br />
      <p>
        我要你<strong>试<span id="cursor">你你</span>着</strong
        >选择这些<strong>加粗的词语</strong>。
      </p>
    </div>
    <button>选择加粗的词语</button>

    <script>
      let button = document.querySelector('button');
      let editor = document.getElementById('editor');

      button.addEventListener('click', () => {
        const selection = window.getSelection();

        console.log('selection:', selection);
        console.log('rangeCount:', selection.rangeCount); // 0 或 1 或 > 1
        console.log('isCollapsed:', selection.isCollapsed); // 是否没有选中 true表示没有选中文本（只有光标或没有光标） false表示存在选中文本

        // selection.anchorNode    // 选区开始的节点
        // selection.focusNode     // 选区结束的节点
        // selection.anchorOffset  // 在 anchorNode 中的偏移量
        // selection.focusOffset   // 在 focusNode 中的偏移量
        // 用户从左到右选择："hello world"
        // anchor在"h"前面，focus在"d"后面
        // 用户从右到左选择："hello world"
        // anchor在"d"后面，focus在"h"前面

        // selection.type // "None" | "Caret"| "Range" : None表示没有光标 Caret表示光标位置（折叠选区）Range表示选择了文本范围

        /* 没有光标 */
        if (selection.rangeCount === 0) {
          console.log('没有光标', selection.rangeCount);
        } else if (selection.rangeCount > 0) {
          /* 存在光标或选中文本 */
          const range = selection.getRangeAt(0);
          console.log('range:', range);
          console.log('开始节点:', range.startContainer);
          console.log('开始节点的下标:', range.startOffset);
          console.log('结束节点:', range.endContainer);
          console.log('结束节点的下标:', range.endOffset);
          console.log(
            '开始节点和结束节点相同 表示选择的是同一个节点',
            range.startContainer === range.endContainer
          );
          console.log('是否折叠:', range.collapsed);
          // 获取选中的文本
          console.log('选中文本:', range.toString());

          // 获取视觉位置
          const rect = range.getBoundingClientRect();
          console.log('位置:', rect);

          /* 存在光标且没有选中文本 */
          if (
            range.startContainer === range.endContainer &&
            range.startOffset === range.endOffset
          ) {
            console.log('光标位置在 ', range.startContainer, range.startOffset);
          } else {
            /* 存在选中文本 */
          }
        }

        console.log('@@', editor.innerHTML);

        // editor.innerHTML = `<div>啊的方法就是发顺丰送到了法国绝世独立<span id="cursor"></span>开关机</div>`

        // 恢复给 document.getElementById("cursor") 光标
        const selection = window.getSelection();
        if (selection.rangeCount > 0) {
          selection.removeAllRanges();
        }
        const range = document.createRange();
        range.selectNode(document.getElementById('cursor'));
        selection.addRange(range);
      });
    </script>
  </body>
</html>
