<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      console.log('a');
      for (var i = 0; i < 3; i++) {
        console.log(i);
        setTimeout(() => {
          console.log(i); // 3
        }, i * 1000); // 0, 1, 2秒
      }
      new Promise(resolve => {
        console.log('b');
        setTimeout(() => {
          resolve('c');
        });
      }).then(res => {
        console.log(res);
      });
      console.log('d');

      // 同步: 'a', 0, 1, 2, 'b', 'd'
      // 0s宏任务: 3
      // 0s微任务+宏任务: c
      // 1s: 3
      // 2s: 3
    </script>
  </body>
</html>
