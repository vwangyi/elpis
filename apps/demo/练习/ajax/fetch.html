<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const URL = 'http://localhost/todo/list';

      fetch(URL, {
        method: 'get'
      })
        .then(res => res.json())
        .then(res => {
          console.log(res);
        });

      async function req() {
        const res = await fetch(URL, {
          method: 'get'
        }).then(res => res.json());
      }
    </script>
  </body>
</html>
