<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        display: grid;
        /* grid-template-columns: 200px 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr; */
        grid-template-columns: 200px repeat(8, 1fr);
        /*
                和flex的区别
                1. flex的设置在子元素上  grid在父元素
            */
      }

      aside {
        height: 100vh;
        background-color: #aaa;
      }
      main {
        height: 100vh;
        background-color: #ccc;
      }
      div {
        height: 100vh;
        background-color: #666;
      }
    </style>
  </head>
  <body>
    <aside></aside>
    <main></main>
    <div></div>
    <aside></aside>
    <main></main>
    <div></div>
    <aside></aside>
    <main></main>
    <div></div>
  </body>
</html>
