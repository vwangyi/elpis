    <title>Document</title>
    <link rel="stylesheet" href="../字体图标/icon/iconfont.css" />
    <style>
      img {
        display: block;
      }

        color: white;

      }
      .nav-item {
        height: 100%;
        width: 80px;

        align-items: center;

        position: relative;
      }
      body {

        height: 80px;

      }
      .avatar {
        width: 50px;
        height: 50px;
        border: 2px solid white;
        border-radius: 50%;
        overflow: hidden;
      }
      .avatar img {
        width: 100%;
      }

      .btn-icon {
        font-size: 16px;
      }
      .btn {
        padding: 8px 24px;
        border-radius: 8px;
        background-color: pink;
        /* height: 30px; */
      }
      .count {
        position: absolute;
        left: 45px;
        top: 8px;
        height: 24px;
        line-height: 24px;
        font-size: 14px;
        background-color: #f00;
        border-radius: 12px;
        padding: 0 8px;
      }
    </style>
