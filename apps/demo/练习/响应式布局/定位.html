<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        position: relative;
        height: 100px;
      }

      .box {
        width: 100px;
        height: 100px;
        background-color: red;
        position: absolute;
      }
      .box:nth-child(2) {
        left: 110px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
    </div>
  </body>
</html>
