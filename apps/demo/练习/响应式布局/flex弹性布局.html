<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        /* flex-direction: column; */
        flex-direction: row;
        /*
                横向必给宽度
                纵向必给高度
            */
      }
      aside {
        /* flex: 2; */
        width: 100px;
        height: 100vh;
        background-color: #aaa;
      }
      main {
        flex: 1;
        height: 100vh;
        background-color: #ccc;
      }
      div {
        flex: 1;
        height: 100vh;
        background-color: #666;
      }

      /*
            多个元素横向排列
            1. inline-block: 有空隙, 给父元素font-size: 0
            2. float: 脱标
            3. position: absolute: 脱标
            4. flex
        */
    </style>
  </head>
  <body>
    <aside></aside>
    <main></main>
    <div></div>
  </body>
</html>
