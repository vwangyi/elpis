<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul></ul>

    <script>
      var arr = ['张三', '李四', '王五'];

      var ul = document.querySelector('ul');

      for (var item of arr) {
        // item: '张三'
        var li = document.createElement('li');
        li.innerText = item;
        ul.appendChild(li);
      }
    </script>
  </body>
</html>
