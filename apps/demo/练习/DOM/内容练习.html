<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul></ul>

    <script>
      var liList = document.querySelectorAll('li');
      for (var i = 0; i < liList.length; i++) {
        // i: 0, 1, 2, ...
        // liList[i]
        var li = liList[i];
        li.innerText = i;
      }
    </script>
  </body>
</html>
