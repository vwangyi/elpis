<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 1行溢出显示省略号 */
      .ellipsis {
        width: 200px;
        display: block; /*  不能用 inline-block  */
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 1;
        line-clamp: 1;
        overflow: hidden !important;
        box-sizing: border-box !important;
        white-space: nowrap;
        text-overflow: ellipsis !important;
        word-break: break-all;
      }

      /* 2行溢出显示省略号 */
      .ellipsis {
        width: 200px;
        overflow: hidden;
        display: -webkit-box; /* 将对象作为弹性伸缩盒模型显示 */
        -webkit-line-clamp: 2; /* 行数，值可以改，表示展示X行后多余的缩略展示 */
        -webkit-box-orient: vertical; /* 设置或检索伸缩盒对象的子元素的排列方式 */
        word-break: break-all;
        border: 1px solid #eef0f5;
      }

      /* 3行溢出显示省略号 */
      .ellipsis {
        width: 200px;
        word-break: break-all;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        border: 1px solid #eef0f5;
      }
    </style>
  </head>
  <body></body>
</html>
